<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Registrations – EventHub</title>
  <link rel="stylesheet" href="style.css">
  <!-- Cropper.js CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" />
  <style>
    html { scroll-behavior: smooth; }
    body { background: var(--color-gray-100); color: var(--color-gray-900); }

    /* ── Detailed Card Layout ── */
    .detailed-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }
    
    .detail-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 24px;
      border: 1px solid var(--color-gray-300);
      box-shadow: var(--shadow-md);
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }
    .detail-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-lg);
      border-color: var(--color-primary);
    }
    
    /* Premium Top Glow */
    .detail-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--card-color, var(--color-primary));
    }

    .detail-card-header {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .detail-icon {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      flex-shrink: 0;
      color: white;
    }

    .detail-title {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--color-gray-900);
      line-height: 1.3;
    }

    .detail-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      background: var(--color-gray-100);
      padding: 16px;
      border-radius: 12px;
      margin-top: 8px;
    }
    
    .info-chunk {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .info-label {
      font-size: 0.75rem;
      color: var(--color-gray-500);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .info-value {
      font-size: 0.9rem;
      color: var(--color-gray-800);
      font-weight: 600;
    }

    /* ── Empty state ── */
    .empty-state { text-align:center; padding:64px 24px; color:var(--color-gray-400); background: var(--glass-bg); border-radius: 24px; border: 1px dashed var(--color-gray-300); }
    .empty-state .icon { font-size:3.5rem; margin-bottom:16px; opacity: 0.5; }
  </style>
</head>
<body>

  <div class="toast-container" id="toastContainer"></div>

  <!-- Navbar -->
  <nav class="navbar solid" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="navbar-brand">
        <img src="https://geu.ac.in/wp-content/uploads/2023/03/geu_white.svg" alt="GEU Logo" style="height: 45px; width: auto; vertical-align: middle; margin-right: 12px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.15));">
        EventHub
      </a>
      <ul class="navbar-menu" id="navbarMenu">
        <li><a href="index.html">Home</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="student-dashboard.html" class="active">Dashboard</a></li>
        <li><a href="#" id="logoutBtn" style="color:var(--color-error)">Logout</a></li>
      </ul>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div class="Dashboard-layout">
    <aside class="dashboard-sidebar">
      <div style="text-align:center; padding: 24px 0 32px; border-bottom:1px solid rgba(255,255,255,0.05); margin-bottom: 24px;">
        <div class="avatar-wrapper" onclick="document.getElementById('avatarUpload').click();" title="Change Profile Picture">
          <div id="sideAvatar" class="profile-avatar">S</div>
          <div class="avatar-edit-overlay">📷</div>
          <input type="file" id="avatarUpload" accept="image/png, image/jpeg, image/webp" style="display:none;" onchange="uploadAvatar(this)">
        </div>
        <h4 id="sidebarName" style="font-weight: 800; font-size: 1.1rem; letter-spacing: -0.5px;">Student</h4>
        <p id="sidebarDept" style="font-size: 0.8rem; opacity: 0.7; font-weight: 500; margin-top: 4px;">Department</p>
        <div style="margin-top: 15px;">
          <span id="sidebarRole" class="role-badge" style="background: rgba(108, 99, 255, 0.2); color: #fff; padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.1);">STUDENT</span>
        </div>
      </div>
      <nav class="sidebar-nav" style="display: flex; flex-direction: column; gap: 4px;">
        <a href="student-dashboard.html" class="sidebar-nav-item"><span style="font-size: 1.1rem;">📊</span><span>Overview</span></a>
        <a href="events.html" class="sidebar-nav-item"><span style="font-size: 1.1rem;">🔍</span><span>Browse Events</span></a>
        <a href="my-registrations.html" class="sidebar-nav-item active"><span style="font-size: 1.1rem;">📅</span><span>My Registrations</span></a>
        <a href="achievements.html" class="sidebar-nav-item"><span style="font-size: 1.1rem;">🏆</span><span>Achievements</span></a>

        <div style="margin-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px;">
          <a href="login.html" class="sidebar-nav-item" style="color: #ef4444;"><span style="font-size: 1.1rem;">🚪</span><span>Logout</span></a>
        </div>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-content">
      <header class="dashboard-header" style="margin-bottom: 32px;">
        <h1 style="font-size: 2rem; font-weight: 800; color: var(--color-gray-900); display: flex; align-items: center; gap: 12px;">📅 My Registrations</h1>
        <p style="color: var(--color-gray-600); font-weight: 500; margin-top: 6px; font-size: 1.05rem;">
          Track all your upcoming and past events in detail.
        </p>
      </header>

      <div id="loadingIndicator" style="text-align: center; padding: 40px; color: var(--color-gray-500);">
        Loading your registrations...
      </div>

      <div id="detailedEventsGrid" class="detailed-grid" style="display: none;">
        <!-- Loaded by JS -->
      </div>
    </main>
  </div>

  <!-- Cropper.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
  <script src="js/main.js"></script>
  <script>
    /* ──────────────────────────────────────────────
       MY REGISTRATIONS PAGE
    ────────────────────────────────────────────── */

    function formatDateTime(dbDateString) {
      if (!dbDateString) return 'N/A';
      return new Date(dbDateString).toLocaleString('en-IN', {
        day: 'numeric', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit', hour12: true
      });
    }

    function renderDetailedEvents(events) {
      const grid = document.getElementById('detailedEventsGrid');
      const loader = document.getElementById('loadingIndicator');
      
      loader.style.display = 'none';
      grid.style.display = 'grid';

      if (!events || events.length === 0) {
        grid.style.display = 'block';
        grid.innerHTML = `
          <div class="empty-state">
            <div class="icon">📭</div>
            <h3 style="color: var(--color-gray-900); font-weight: 800; font-size: 1.4rem; margin-bottom: 8px;">No Registrations Yet</h3>
            <p style="margin-bottom: 24px;">You haven't signed up for any campus events. Discover exciting opportunities today!</p>
            <a href="events.html" class="btn btn-primary">🎯 Browse Live Events</a>
          </div>`;
        return;
      }

      grid.innerHTML = events.map(ev => `
        <div class="detail-card" style="--card-color: ${ev.color};">
          <div class="detail-card-header">
            <div class="detail-icon" style="background: ${ev.color};">${ev.icon}</div>
            <div>
              <span class="badge ${ev.status === 'full' ? 'badge-warning' : 'badge-success'}" style="margin-bottom: 6px; display: inline-block;">
                ${ev.status === 'full' ? 'Event Full' : (ev.days_left <= 0 ? 'Completed' : 'Registered')}
              </span>
              <h3 class="detail-title">${ev.name}</h3>
            </div>
          </div>
          
          <div class="detail-info-grid">
            <div class="info-chunk">
              <span class="info-label">📍 Venue</span>
              <span class="info-value">${ev.location || 'TBD'}</span>
            </div>
            <div class="info-chunk">
              <span class="info-label">🏷️ Category</span>
              <span class="info-value" style="text-transform: capitalize;">${ev.category || 'General'}</span>
            </div>
            <div class="info-chunk">
              <span class="info-label">📅 Event Date</span>
              <span class="info-value">${formatDateTime(ev.event_date).split(',')[0]}</span>
            </div>
            <div class="info-chunk">
              <span class="info-label">⏱️ Registered On</span>
              <span class="info-value">${formatDateTime(ev.registered_at)}</span>
            </div>
          </div>

          <div style="margin-top: auto; padding-top: 16px; border-top: 1px dashed var(--color-gray-300);">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <span style="font-size: 0.85rem; color: var(--color-gray-500); font-weight: 600;">Event Capacity: ${ev.fill_pct}%</span>
              ${ev.days_left > 0 
                ? `<span style="font-size: 0.9rem; font-weight: 800; color: var(--color-primary);">${ev.days_left} Days Left</span>` 
                : `<span style="font-size: 0.9rem; font-weight: 800; color: var(--color-success);">✅ Attended</span>`
              }
            </div>
            <div style="height: 6px; background: #eef0f7; border-radius: 10px; margin-top: 8px; overflow: hidden;">
              <div style="height: 100%; border-radius: 10px; background: ${ev.color}; width: ${ev.fill_pct}%;"></div>
            </div>
          </div>
        </div>
      `).join('');
    }


    async function initializePage() {
      try {
        const res  = await fetch('php/student_data.php', { cache: 'no-store' });
        const data = await res.json();
        if (!data.success) {
            if (data.message && data.message.includes('Unauthorized')) {
                window.location.href = 'login.html';
                return;
            }
            document.getElementById('loadingIndicator').textContent = 'Error loading registrations.';
            return;
        }

        /* Sidebar Profile */
        const u = data.user;
        const ava = document.getElementById('sideAvatar');
        if (u.profile_pic) {
          ava.style.backgroundImage = `url('${u.profile_pic}')`;
          ava.textContent = '';
        } else {
          ava.style.backgroundImage = 'none';
          ava.textContent = (u.first_name[0] + u.last_name[0]).toUpperCase();
        }
        document.getElementById('sidebarName').textContent = u.first_name + ' ' + u.last_name;
        document.getElementById('sidebarDept').textContent = u.department || u.email;

        /* Render Detailed Grid */
        renderDetailedEvents(data.my_events);

      } catch (e) { 
        document.getElementById('loadingIndicator').textContent = 'Cannot connect to server. Please try again.';
      }
    }

    initializePage();
  </script>
</body>
</html>
