<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – EventHub</title>
  <link rel="stylesheet" href="style.css?v=1.2">
</head>
<body class="auth-page">
  <a href="index.html" class="back-home">← Back to Home</a>

  <div class="auth-card">
    <div style="padding: 40px;">

    <div class="form-logo">
      <img src="https://geu.ac.in/wp-content/uploads/2023/03/geu_white.svg" alt="GEU Logo" style="height: 40px; width: auto; filter: invert(1);"> 
      <span>EventHub</span>
    </div>
    <p class="form-subtitle">Create your free account and start exploring events!</p>

    <form id="registerForm" action="php/register.php" method="POST" novalidate>
      <div class="form-row">
        <div class="input-group">
          <span class="input-icon">👤</span>
          <input type="text" id="firstName" name="first_name" placeholder="First Name" required>
        </div>
        <div class="input-group">
          <span class="input-icon">👤</span>
          <input type="text" id="lastName" name="last_name" placeholder="Last Name" required>
        </div>
      </div>

      <div class="input-group">
        <span class="input-icon">📧</span>
        <input type="email" id="regEmail" name="email" placeholder="College Email Address" required>
        <span class="error-msg" id="emailError">Please enter a valid email address.</span>
      </div>

      <div class="input-group">
        <span class="input-icon">🎓</span>
        <select id="regRole" name="role" required>
          <option value="">Register As...</option>
          <option value="student">Student</option>
          <option value="organizer">Event Organizer</option>
        </select>
      </div>

      <div class="input-group">
        <span class="input-icon">🏛️</span>
        <input type="text" id="department" name="department" placeholder="Department (e.g. CSE, ECE)" required>
      </div>

      <div class="input-group">
        <span class="input-icon">🔒</span>
        <input type="password" id="regPassword" name="password" placeholder="Password (min. 8 characters)" required oninput="checkStrength(this.value)">
        <button type="button" class="password-toggle" onclick="togglePwd('regPassword',this)">👁️</button>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <span class="error-msg" id="passLenError">Password must be at least 8 characters.</span>
      </div>

      <div class="input-group">
        <span class="input-icon">✅</span>
        <input type="password" id="confirmPwd" name="confirm_password" placeholder="Confirm Password" required>
        <button type="button" class="password-toggle" onclick="togglePwd('confirmPwd',this)">👁️</button>
        <span class="error-msg" id="confirmError">Passwords do not match.</span>
      </div>

      <div style="display:flex;align-items:center;gap:8px;margin:12px 0;font-size:0.82rem;color:#374151;">
        <input type="checkbox" id="terms" required style="width:16px;height:16px;accent-color:#6c63ff;">
        <label for="terms">I agree to the <a href="#" style="color:#6c63ff;font-weight:600;">Terms of Service</a> and <a href="#" style="color:#6c63ff;font-weight:600;">Privacy Policy</a></label>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; margin-top: 20px;">✨ Create Free Account</button>

    </form>

    <div class="switch-text">Already have an account? <a href="login.html">Login here</a></div>
    </div>
  </div>


  <script>
    function togglePwd(id, btn) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
      btn.textContent = el.type === 'password' ? '👁️' : '🙈';
    }

    function checkStrength(val) {
      const fill = document.getElementById('strengthFill');
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const pct = (score / 4) * 100;
      const colors = ['#ef4444','#f59e0b','#3b82f6','#10b981'];
      fill.style.width = pct + '%';
      fill.style.background = colors[score - 1] || '#eef0f7';
    }

    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      let valid = true;
      document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');

      const email = document.getElementById('regEmail').value;
      const pass  = document.getElementById('regPassword').value;
      const conf  = document.getElementById('confirmPwd').value;

      if (!email.includes('@')) { document.getElementById('emailError').style.display='block'; valid=false; }
      if (pass.length < 8) { document.getElementById('passLenError').style.display='block'; valid=false; }
      if (pass !== conf) { document.getElementById('confirmError').style.display='block'; valid=false; }

      if (valid) {
        alert('✅ Account created successfully! Please login.');
        window.location.href = 'login.html';
      }
    });
  </script>
</body>
</html>
